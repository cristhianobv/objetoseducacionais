<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFFar - Programação I</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b0f1a;
      color: #fff;
      text-align: center;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      background: #111827;
      border-bottom: 2px solid #22c55e;
    }

    header h2 {
      margin: 0;
      font-size: 18px;
    }

    header p {
      margin: 2px;
      font-size: 14px;
      opacity: 0.9;
    }

    .menu-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 120px);
      gap: 20px;
    }

    .menu a {
      display: block;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 8px;
      background: #22c55e;
      color: #000;
      font-size: 18px;
      transition: 0.3s;
      width: 220px;
    }

    .menu a:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .card {
      background: rgba(17, 24, 39, 0.9);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #22c55e;
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<header>
  <h2>IFFar - Programação I</h2>
  <p>Professor Cristhiano Vasconcellos</p>
</header>

<div class="menu-container">

    <p>Selecione uma atividade</p>
  </div>

</a>
  </div>
</div>

<footer>
  Objetos de Aprendizagem Interativos
</footer>

</body>
</html>

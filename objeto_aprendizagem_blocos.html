<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monte o Algoritmo - Programação I</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111827;
      border-bottom: 2px solid #22c55e;
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .logo-area h2 {
      font-size: 1.4rem;
      font-weight: 600;
    }
    .logo-area p {
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .pontuacao {
      background: rgba(34, 197, 94, 0.15);
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: bold;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    /* Orientação no topo */
    .orientacao {
      text-align: center;
      background: #111827;
      padding: 10px;
      margin: 0 auto;
      font-size: 0.9rem;
      color: #22c55e;
      border-bottom: 1px solid rgba(34, 197, 94, 0.3);
    }
    .orientacao i {
      margin-right: 8px;
    }

    .container {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: rgba(17, 24, 39, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 1.5rem;
      width: 320px;
      min-height: 400px;
      border: 1px solid rgba(34, 197, 94, 0.2);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    .card h2 {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.5rem;
      color: #22c55e;
    }

    .bloco {
      background: #22c55e;
      color: #000;
      font-weight: bold;
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      text-align: center;
      cursor: grab;
      transition: 0.1s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      user-select: none;
    }
    .bloco:active {
      cursor: grabbing;
    }

    .dropzone {
      min-height: 300px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      padding: 12px;
      border: 2px dashed rgba(34, 197, 94, 0.5);
      transition: background 0.2s;
      display: block;
    }
    .dropzone .bloco {
      cursor: default;
      background: #1f2937;
      color: #fff;
      border-left: 4px solid #22c55e;
    }
    .dropzone .bloco:active {
      cursor: default;
    }

    #blocos-origem {
      display: block;
    }

    .enunciado {
      text-align: center;
      font-size: 1.2rem;
      margin: 1rem auto 0;
      background: #111827;
      padding: 12px;
      border-radius: 30px;
      max-width: 90%;
      border-left: 4px solid #22c55e;
    }

    .controles {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }
    button {
      background: #22c55e;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.1s;
      box-shadow: 0 2px 0 #15803d;
    }
    button:active {
      transform: translateY(2px);
      box-shadow: 0 0 0 #15803d;
    }
    button:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }
    .feedback {
      text-align: center;
      font-size: 1.1rem;
      margin: 10px;
      padding: 8px;
    }
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #6b7280;
      border-top: 1px solid rgba(34, 197, 94, 0.2);
      margin-top: auto;
    }
  </style>
</head>
<body>
<header>
  <div class="logo-area">
    <h2>IFFar - Programação I</h2>
    <p>Professor Cristhiano Vasconcellos</p>
  </div>
  <div class="pontuacao" id="pontuacao">Pontuação: 0</div>
</header>

<!-- Orientação no topo -->
<div class="orientacao">
  <i class="fas fa-arrows-alt"></i> Arraste os blocos para a área da direita na ordem correta
</div>

<div class="enunciado" id="enunciado"></div>

<div class="container">
  <div class="card">
    <h2>📦 Blocos</h2>
    <div id="blocos-origem" class="dropzone" style="border: none; background: none; padding: 0;"></div>
  </div>
  <div class="card">
    <h2>🧩 Seu Algoritmo</h2>
    <div id="dropzone" class="dropzone"></div>
  </div>
</div>

<div class="controles">
  <button id="verificarBtn">✅ Verificar</button>
  <button id="proximoBtn">⏩ Próximo</button>
  <button id="reiniciarBtn">🔄 Reiniciar Desafio</button>
  <button id="finalizarBtn" style="background:#dc3545; box-shadow:0 2px 0 #b91c1c;">📥 Finalizar e Registrar</button>
</div>
<div id="feedback" class="feedback"></div>
<footer>
  <span><i class="fas fa-graduation-cap"></i> IFFar - Programação I | Todos os objetos são interativos e registram seu progresso</span>
</footer>

<script>
  // ---------- DADOS DOS DESAFIOS ----------
  const desafios = [
    { enunciado: 'Peça um número e diga se é maior que 10', blocos: ['leia numero','se numero > 10 então','escreva "Maior que 10"','fimse'], resposta: ['leia numero','se numero > 10 então','escreva "Maior que 10"','fimse'] },
    { enunciado: 'Peça um número e diga se é par', blocos: ['leia numero','se numero % 2 == 0 então','escreva "Par"','fimse'], resposta: ['leia numero','se numero % 2 == 0 então','escreva "Par"','fimse'] },
    { enunciado: 'Peça um número e diga se é positivo', blocos: ['leia numero','se numero > 0 então','escreva "Positivo"','fimse'], resposta: ['leia numero','se numero > 0 então','escreva "Positivo"','fimse'] },
    { enunciado: 'Peça dois números e mostre a soma', blocos: ['leia a','leia b','soma = a + b','escreva soma'], resposta: ['leia a','leia b','soma = a + b','escreva soma'] },
    { enunciado: 'Peça um número e diga se é menor que 0', blocos: ['leia numero','se numero < 0 então','escreva "Negativo"','fimse'], resposta: ['leia numero','se numero < 0 então','escreva "Negativo"','fimse'] },
    { enunciado: 'Peça um número e mostre o dobro', blocos: ['leia numero','dobro = numero * 2','escreva dobro'], resposta: ['leia numero','dobro = numero * 2','escreva dobro'] },
    { enunciado: 'Peça um número e diga se é igual a 5', blocos: ['leia numero','se numero == 5 então','escreva "Igual a 5"','fimse'], resposta: ['leia numero','se numero == 5 então','escreva "Igual a 5"','fimse'] },
    { enunciado: 'Peça um número e mostre seu quadrado', blocos: ['leia numero','quadrado = numero * numero','escreva quadrado'], resposta: ['leia numero','quadrado = numero * numero','escreva quadrado'] },
    { enunciado: 'Peça dois números e mostre o maior', blocos: ['leia a','leia b','se a > b então','escreva a','fimse'], resposta: ['leia a','leia b','se a > b então','escreva a','fimse'] },
    { enunciado: 'Peça um número e diga se é diferente de 0', blocos: ['leia numero','se numero != 0 então','escreva "Diferente de zero"','fimse'], resposta: ['leia numero','se numero != 0 então','escreva "Diferente de zero"','fimse'] }
  ];

  let atual = 0;
  let pontos = 0;
  let acertou = false;
  let dragged = null;
  let finalizado = false;

  const URL_WEBAPP = "https://script.google.com/macros/s/AKfycbzoeygTm-R27yb8QOcdH0s7fViv6vGPQ5MtDuCgHBt3RhvFVQKlGxf3A7yQUR3RfRqFcw/exec";
  const NOME_ATIVIDADE = "Monte os Blocos";

  // ---------- FUNÇÕES AUXILIARES ----------
  function obterNomeAluno() {
    let nome = sessionStorage.getItem("nomeAluno");
    if (!nome) {
      nome = prompt("Digite seu nome completo para registrar sua atividade:");
      if (nome && nome.trim() !== "") sessionStorage.setItem("nomeAluno", nome.trim());
      else nome = "Anônimo";
    }
    return nome;
  }

  async function registrarResultado(nome, atividade, acertos, total) {
    const dados = { nome, atividade, acertos, total };
    try {
      await fetch(URL_WEBAPP, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
      });
      alert(`✅ Registro enviado!\nNome: ${nome}\nAcertos: ${acertos}/${total}`);
    } catch (e) {
      console.error(e);
      alert("❌ Erro ao enviar registro. Tente novamente mais tarde.");
    }
  }

  function atualizarPontuacao() {
    document.getElementById('pontuacao').innerText = `Pontuação: ${pontos}`;
  }

  function embaralhar(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function criarBloco(texto, isOrigem = true) {
    const div = document.createElement('div');
    div.className = 'bloco';
    div.innerText = texto;
    if (isOrigem) {
      div.draggable = true;
      div.addEventListener('dragstart', (e) => {
        if (finalizado) {
          e.preventDefault();
          return false;
        }
        dragged = div;
        e.dataTransfer.setData('text/plain', texto);
      });
    } else {
      div.draggable = false;
    }
    return div;
  }

  function reiniciarDesafio() {
    if (finalizado) return;
    const desafio = desafios[atual];
    const origemDiv = document.getElementById('blocos-origem');
    const dropDiv = document.getElementById('dropzone');

    origemDiv.innerHTML = '';
    dropDiv.innerHTML = '';

    const blocosEmbaralhados = embaralhar([...desafio.blocos]);
    blocosEmbaralhados.forEach(texto => {
      origemDiv.appendChild(criarBloco(texto, true));
    });

    acertou = false;
    document.getElementById('feedback').innerHTML = '';
  }

  function carregarDesafio(indice) {
    if (finalizado) return;
    const desafio = desafios[indice];
    document.getElementById('enunciado').innerText = desafio.enunciado;

    const origemDiv = document.getElementById('blocos-origem');
    const dropDiv = document.getElementById('dropzone');

    origemDiv.innerHTML = '';
    dropDiv.innerHTML = '';

    const blocosEmbaralhados = embaralhar([...desafio.blocos]);
    blocosEmbaralhados.forEach(texto => {
      origemDiv.appendChild(criarBloco(texto, true));
    });

    acertou = false;
    document.getElementById('feedback').innerHTML = '';
  }

  function proximoDesafio() {
    if (finalizado) return;
    if (atual + 1 < desafios.length) {
      atual++;
      carregarDesafio(atual);
    } else {
      finalizarAtividade();
    }
  }

  function verificar() {
    if (finalizado) return;
    const dropDiv = document.getElementById('dropzone');
    const respostaUsuario = Array.from(dropDiv.children).map(el => el.innerText);
    const correta = desafios[atual].resposta;
    const feedback = document.getElementById('feedback');

    if (JSON.stringify(respostaUsuario) === JSON.stringify(correta)) {
      feedback.innerHTML = '<span style="color:#4caf50;">✅ Correto! Parabéns.</span>';
      if (!acertou) {
        pontos++;
        atualizarPontuacao();
        acertou = true;
      }
    } else {
      feedback.innerHTML = '<span style="color:#ff5252;">❌ Ordem incorreta! Tente novamente arrumando os blocos.</span>';
    }
  }

  function finalizarAtividade() {
    if (finalizado) return;
    finalizado = true;
    const nome = obterNomeAluno();
    registrarResultado(nome, NOME_ATIVIDADE, pontos, desafios.length).then(() => {
      document.body.innerHTML = `
        <header style="display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#111827; border-bottom:2px solid #22c55e;">
          <div><h2>IFFar - Programação I</h2><p>Professor Cristhiano Vasconcellos</p></div>
          <div>Pontuação final: ${pontos}</div>
        </header>
        <div style="text-align:center; padding:50px;">
          <h1>🎉 Atividade concluída! 🎉</h1>
          <h2>Você acertou ${pontos} de ${desafios.length} desafios.</h2>
          <button onclick="location.href='index.html'">Voltar ao Menu</button>
        </div>
      `;
    });
  }

  // Eventos de drag and drop
  const dropzone = document.getElementById('dropzone');
  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
  });
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    if (finalizado) return;
    if (dragged && dragged.parentNode === document.getElementById('blocos-origem')) {
      const clone = criarBloco(dragged.innerText, false);
      dropzone.appendChild(clone);
      dragged.remove();
      dragged = null;
    }
  });

  // Botões
  document.getElementById('verificarBtn').addEventListener('click', verificar);
  document.getElementById('proximoBtn').addEventListener('click', proximoDesafio);
  document.getElementById('reiniciarBtn').addEventListener('click', reiniciarDesafio);
  document.getElementById('finalizarBtn').addEventListener('click', finalizarAtividade);

  // Inicialização
  atualizarPontuacao();
  carregarDesafio(0);
</script>
</body>
</html>
